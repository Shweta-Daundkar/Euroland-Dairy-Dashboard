<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Employee Payment</title>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js">
  </script>

	<style type="text/css">
		.brandname{
			padding: 10px;
			background-color:#4CE36D ;
			color: white;
			text-align: center;

		}
		#tagline{
			color:#000123 ;
		}
		
		.well{
			background-color: gold;
		}

		.well:hover{
			background-color: limegreen;
			color: white;
			cursor: pointer;
		}

		.cardcontainer{
			box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.5);
			transition: 0.3s;
			border: 2px solid gold ;
		}

		.cardcontainer:hover{
			box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
		}

		.carddata{
			padding: 25px;
			padding-bottom: 10px;
			width: 100%;
			background-color:#E34CE1 ;
			color: white;
		}

		.amountclass{
			font-size: 20px;

		}

		.enq_form{
			background-color: gold;
			padding: 20px;
			width: 40%;
			margin-left: 25%;
		}
    </style>
    <script type="text/javascript">
    	function validate_data()
        {
            if(document.f1.fname.value =="")
            {
                alert("Please enter the first name")
                document.f1.fname.focus();
                return false;
            }
            var data =/^[A-Za-z]+$/;
            if(!document.f1.fname.value.match(data))
            {
                alert("Please valid First Name   ")
                document.f1.fname.value.focus();
                return false;
            }
            if(document.f1.lname.value =="")
            {
                alert("Please enter the Last name")
                document.f1.lname.focus();
                return false;
            }
            var data =/^[A-Za-z]+$/;
            if(!document.f1.lname.value.match(data))
            {
                alert("Please valid Last Name   ")
                document.f1.lname.value.focus();
                return false;
            }
            if(document.f1.p_amt.value =="")
            {
                alert("Please enter the Payment Amount")
                document.f1.p_amt.focus();
                return false;
            }
            if(document.f1.job.value=="")
            {
            	alert("Please Select the Job ");
            	document.f1.job.focus();
            	return false;
            }
            if(document.f1.mode[0].checked==false && document.f1.mode[1].checked==false && document.f1.mode[2].checked==false)
            {
            	alert("Please select Payment mode")
            	return false;
            }
            if(document.f1.incentive[0].checked==false && document.f1.incentive[1].checked==false && document.f1.incentive[2].checked==false && document.f1.incentive[3].checked==false)
            {
            	alert("Please select Incentive Mode")
            	return false;
            }
        }
    	function show_date_time()
    	{
    		var d = new Date();
    		var ctime=d.toLocaleTimeString();
    		document.f1.p_time.value=ctime;

    		var dd=d.getDate();
    		var mm=d.getMonth()+1;
    		var yy=d.getFullYear();

    		var cdate = dd+ "/" + mm + "/" + yy;
    		document.f1.p_date.value=cdate;
    	}
    	function calculate_payment()
    	{
    		var pay=document.f1.p_amt.value;
    		var rbtn_value = document.f1.incentive.value;
    		var incentive = pay * (rbtn_value);
    		var fpay = parseInt(pay) + parseInt(incentive);
    		document.f1.f_amt.value=fpay;
    	}
    </script>
</head>
<body onload="show_date_time()">
	<div class="jumbotron brandname">
		<h2>Euroland Dairy</h2>
		<p id="tagline">Ireland Dairy Since 1950</p>
	</div>
	<div class="container-fluid ">
		<div class="row enq_form cardcontainer">
			<h2 class="text-center">Employee Payment</h2>
			<form class="form" name="f1" >
				<div class="form-group">
					<label>Payment Date</label>
					<input type="text" name="p_date" class="form-control" readonly>
				</div>
				<div class="form-group">
					<label>Payment Time</label>
					<input type="text" name="p_time" class="form-control" readonly>	
				</div>
				<div class="form-group">
					<label>First Name</label>
					<input type="text" name="fname" class="form-control">	
				</div>
				<div class="form-group">
					<label>Last Name</label>
					<input type="text" name="lname" class="form-control">	
				</div>
				<div class="form-group">
					<label>Payment Amt</label>
					<input type="text" name="p_amt" class="form-control">	
				</div>
				<div class="form-group">
					<label>Job</label>
					<select name="job" class="form-control">
						<option disabled selected value="">Select Job</option>
						<option value="manager">Manager </option>
						<option value="Developer">Developer </option>
						<option value="Tester">Tester </option>
						<option value="Analyst">Analyst </option>
					</select>
				</div>
				<div class="form-group">
					<label>Payment Mode</label>
					<div class="radio-inline">
					    <input type="radio" name="mode" value="by_cheque" >By Cheque
				    </div>
				    <div class="radio-inline">
					    <input type="radio" name="mode" value="upi">UPI 
				    </div>
				    <div class="radio-inline">
					    <input type="radio" name="mode" value="net_banking" >Net Banking
				    </div>	
				</div>
				<div class="form-group">
					<label>Incentive Amt</label>
					<div class="radio-inline">
					    <input type="radio" name="incentive" value="0.2" onclick="calculate_payment()">0.2%
				    </div>
				    <div class="radio-inline">
					    <input type="radio" name="incentive" value="0.5" onclick="calculate_payment()">0.5%
				    </div>
				    <div class="radio-inline">
					    <input type="radio" name="incentive" value="1.0" onclick="calculate_payment()">0.10%
				    </div>
				    <div class="radio-inline">
				    	<input type="radio" name="incentive" value="0" onclick="calculate_payment()">No Incentive
				    </div>
				</div>
				<div class="form-group">
					<label>Final Amt</label>
					<input type="text" name="f_amt" class="form-control">	
				</div>
				<div class="form-group">
					<button class="btn  btn-primary" onclick="return validate_data()"> Submit</button>
					<button class="btn  btn-primary"> Reset</button>
				</div>
			</form>
		</div> <!--- Enquiry form --->
	</div>
</body>
</html>
